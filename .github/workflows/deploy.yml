name: Deploy Pipeline

on:
  push:
    branches:
      - main  # Trigger the workflow when changes are pushed to the main branch

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4  # Checks out the repository code

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Install required dependencies

      - name: Deploy Application
        run: |
          # Connect to the server and deploy the updated application
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          cd /path/to/your/app  # Navigate to your app directory
          git pull origin main  # Pull the latest changes
          source venv/bin/activate  # Activate virtual environment (if applicable)
          pip install -r requirements.txt  # Install dependencies
          systemctl restart your-fastapi-service  # Restart the FastAPI service
          EOF
